services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: turbo_runtime
      POSTGRES_USER: turbo_runtime
      POSTGRES_PASSWORD: turbo_runtime
    ports:
      - "55432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turbo_runtime -d turbo_runtime"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
